<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 心率监测器</title>
    <meta name="description" content="心率监测器安全登录页面">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07071a;
            --bg-secondary: #0e0e2a;
            --bg-card: rgba(255, 255, 255, 0.025);
            --bg-card-border: rgba(255, 255, 255, 0.06);
            --bg-input: rgba(255, 255, 255, 0.04);
            --text-primary: #f0f0ff;
            --text-secondary: #8888aa;
            --accent: #ff2d55;
            --accent-light: #ff6b8a;
            --accent-gradient: linear-gradient(135deg, #ff2d55 0%, #ff6b8a 100%);
            --radius-md: 16px;
            --radius-lg: 24px;
            --font-primary: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
        }

        .bg-orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.08) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: orbFloat1 20s ease-in-out infinite;
        }

        .bg-orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(91, 127, 255, 0.06) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: orbFloat2 25s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 20px); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -30px); }
        }

        /* 登录卡片 */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 16px;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(255, 45, 85, 0.02);
            text-align: center;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: rgba(255, 45, 85, 0.1);
            border-radius: 50%;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 45, 85, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px 5px rgba(255, 45, 85, 0.1); }
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="password"] {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 45, 85, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        button.btn-login {
            width: 100%;
            background: var(--accent-gradient);
            border: none;
            border-radius: var(--radius-md);
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(255, 45, 85, 0.2);
        }

        button.btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 45, 85, 0.3);
            filter: brightness(1.1);
        }

        button.btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff4757;
            font-size: 13px;
            margin-top: 16px;
            min-height: 20px;
            opacity: 0;
            transition: var(--transition);
        }

        .error-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="var(--accent)">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <h2>心率监测器</h2>
            <p class="subtitle">私有云端服务，请输入访问密码</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入管理员密码" required autofocus autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="loginBtn">进入系统</button>
                <div id="errorMsg" class="error-message"></div>
            </form>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            const password = passwordInput.value;

            errorMsg.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.textContent = '验证中...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();
                if (response.ok && result.success) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = result.message || '密码错误，请重试';
                    errorMsg.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后再试';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '进入系统';
            }
        }
    </script>
</body>
</html>
